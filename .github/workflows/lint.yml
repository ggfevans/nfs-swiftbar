name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck-sarif converter
        run: |
          curl -fsSL \
            https://github.com/psastras/sarif-rs/releases/download/shellcheck-sarif-v0.8.0/shellcheck-sarif-x86_64-unknown-linux-gnu \
            -o /usr/local/bin/shellcheck-sarif
          chmod +x /usr/local/bin/shellcheck-sarif

      - name: Run ShellCheck and convert to SARIF
        run: |
          shellcheck --format=json nfs.30s.sh > shellcheck.json || true
          shellcheck-sarif < shellcheck.json > shellcheck.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: shellcheck.sarif

      - name: Fail on ShellCheck findings
        run: shellcheck nfs.30s.sh

      - name: Check version tags in sync
        run: |
          bitver=$(sed -n 's/.*<bitbar.version>v\([^<]*\)<.*/\1/p' nfs.30s.sh)
          xver=$(sed -n 's/.*<xbar.version>v\([^<]*\)<.*/\1/p' nfs.30s.sh)
          [ -n "$bitver" ] || { echo "::error::<bitbar.version> not found"; exit 1; }
          [ -n "$xver" ]   || { echo "::error::<xbar.version> not found"; exit 1; }
          [ "$bitver" = "$xver" ] || { echo "::error::version tags differ: bitbar=$bitver xbar=$xver"; exit 1; }
